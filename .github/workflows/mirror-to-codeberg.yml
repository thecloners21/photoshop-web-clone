name: Mirror to Codeberg

on:
  push:
    branches: ['**']
    tags: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Clone from GitHub and push to Codeberg
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY##*/}"
          git clone --bare "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git
          cd repo.git
          git push --force --prune \
            "https://thecloners21:${CB_TOKEN}@codeberg.org/thecloners21/${REPO}.git" \
            'refs/heads/*:refs/heads/*' 'refs/tags/*:refs/tags/*'
